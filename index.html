<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬件项目计划管理看板</title>
<style>
:root {
  --primary:#1a73e8; --primary-dark:#0d47a1; --bg:#f0f2f5;
  --card:#fff; --border:#e0e0e0; --text:#2c3e50; --muted:#888;
  --h-bar:36px; --name-w:580px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── topbar ── */
.topbar{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;padding:0 16px;display:flex;align-items:center;height:48px;gap:12px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:200}
.topbar h1{font-size:15px;font-weight:700;flex:1;white-space:nowrap}
.topbar .nav{display:flex;gap:4px}
.nav-btn{padding:5px 14px;border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:16px;cursor:pointer;font-size:12px;transition:.2s}
.nav-btn:hover{background:rgba(255,255,255,.28)}
.nav-btn.active{background:#fff;color:var(--primary);font-weight:700}
.topbar .acts{display:flex;gap:8px}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;transition:.2s}
.btn-green{background:#43a047;color:#fff}.btn-green:hover{background:#388e3c}
.btn-blue{background:#fff;color:var(--primary)}.btn-blue:hover{background:#e8f0fe}
.btn-red{background:#e53935;color:#fff}.btn-red:hover{background:#c62828}

/* ── 页面容器 ── */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* ════ 主视图：左右结构 ════ */
#page-main{flex-direction:row}
/* 左侧任务面板 */
.left-panel{width:var(--name-w);min-width:320px;max-width:900px;display:flex;flex-direction:column;background:var(--card);border-right:2px solid var(--border);flex-shrink:0;resize:horizontal;overflow:auto}
.left-panel .lp-toolbar{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;background:#fafafa}
.lp-toolbar input,.lp-toolbar select{padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;outline:none;background:#fff}
.lp-toolbar input:focus,.lp-toolbar select:focus{border-color:var(--primary)}
/* 任务列表表头 */
.task-header{display:flex;align-items:center;height:var(--h-bar);padding:0 6px;background:#263238;color:#fff;font-size:11px;font-weight:600;flex-shrink:0;gap:0;overflow:hidden}
.task-header .th-idx{width:26px;flex-shrink:0;padding:0 2px}
.task-header .th-name{flex:1;min-width:120px;padding:0 4px}
.task-header .th-person{width:58px;flex-shrink:0;padding:0 2px}
.task-header .th-start{width:82px;flex-shrink:0;padding:0 2px}
.task-header .th-end{width:82px;flex-shrink:0;padding:0 2px}
.task-header .th-wd{width:46px;flex-shrink:0;text-align:center;padding:0 2px}
.task-header .th-pct{width:56px;flex-shrink:0;text-align:center;padding:0 2px}
/* 任务行滚动区 */
.task-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.task-row{display:flex;align-items:center;height:var(--h-bar);padding:0 6px;border-bottom:1px solid #f0f0f0;cursor:pointer;gap:0;transition:background .15s}
.task-row:hover{background:#e3f2fd}
.task-row.selected{background:#bbdefb}
.task-row.group{background:#eceff1;font-weight:700}
.task-row.group:hover{background:#cfd8dc}
.tr-idx{width:26px;font-size:11px;color:var(--muted);flex-shrink:0;text-align:right;padding:0 2px}
.tr-name{flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;padding:0 4px}
.tr-name.indent{padding-left:16px}
.tr-person{width:58px;font-size:11px;color:#1565c0;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.tr-date{width:82px;font-size:11px;color:#546e7a;flex-shrink:0;padding:0 2px;white-space:nowrap}
.tr-wd{width:46px;font-size:11px;color:#37474f;flex-shrink:0;text-align:center;padding:0 2px}
.tr-pct{width:56px;flex-shrink:0;padding:0 2px}
.mini-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin-top:1px}
.mini-fill{height:100%;border-radius:3px;transition:width .3s}
.pct-label{font-size:10px;color:var(--muted);text-align:right;line-height:1}
/* 右侧甘特图 */
.gantt-toolbar{display:flex;align-items:center;padding:4px 10px;background:#37474f;flex-shrink:0;gap:4px}
.gtb-btn{padding:2px 8px;border:1px solid #546e7a;background:#455a64;color:#cfd8dc;border-radius:4px;cursor:pointer;font-size:12px;transition:.15s}
.gtb-btn:hover{background:#546e7a;color:#fff}
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;transition:width .2s}
.right-panel.collapsed{width:0!important;min-width:0!important;overflow:hidden}
.gantt-toggle{position:absolute;left:-14px;top:50%;transform:translateY(-50%);z-index:100;width:14px;height:48px;background:#455a64;color:#fff;border:none;cursor:pointer;border-radius:4px 0 0 4px;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:.7;transition:.15s}
.gantt-toggle:hover{opacity:1;background:#37474f}
.right-panel-wrap{flex:1;display:flex;position:relative;min-width:0;overflow:hidden}
.gantt-scroll-wrap{flex:1;overflow:auto;position:relative}
.gantt-grid{position:relative;min-width:100%}
/* 甘特表头 */
.gantt-head{position:sticky;top:0;z-index:50;background:#263238}
.gantt-head-months{display:flex;height:20px}
.gantt-head-days{display:flex;height:28px}
.g-month-cell{background:#263238;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;border-right:1px solid #455a64}
.g-day-cell{width:16px;min-width:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:#cfd8dc;border-right:1px solid #37474f}
.g-day-cell .d-num{font-size:9px;line-height:1}
.g-day-cell .d-week{font-size:8px;opacity:.7}
.g-day-cell.today{background:#c62828!important;color:#fff}
.g-day-cell.holiday{background:#f9a825;color:#333}
.g-day-cell.weekend{background:#455a64}
.g-day-cell.workday-extra{background:#4caf50;color:#fff}
/* 甘特行 */
.gantt-rows{position:relative}
.gantt-row{display:flex;align-items:center;height:var(--h-bar);border-bottom:1px solid #f0f0f0;position:relative}
.gantt-row.group{background:#eceff1}
.gantt-row:hover{background:#e3f2fd}
.gantt-row.selected{background:#bbdefb}
.g-cell{width:16px;min-width:16px;height:100%;border-right:1px solid #f5f5f5;flex-shrink:0}
.g-cell.weekend-bg{background:#fafafa}
.g-cell.holiday-bg{background:#fffde7}
.g-cell.today-col{background:rgba(198,40,40,.07)}
.g-cell.workday-extra-bg{background:#f1f8e9}
/* 甘特条 */
.g-bar{position:absolute;height:16px;top:50%;transform:translateY(-50%);border-radius:4px;pointer-events:none}
.g-bar-task{background:#1e88e5}
.g-bar-done{background:#43a047}
.g-bar-group{background:#37474f;height:10px;border-radius:2px}
.g-bar-label{position:absolute;font-size:10px;color:#fff;left:4px;top:50%;transform:translateY(-50%);white-space:nowrap;overflow:hidden;pointer-events:none}

/* ════ 分析页 ════ */
#page-stats{overflow-y:auto;padding:20px 24px;gap:16px;flex-wrap:wrap;flex-direction:row;align-content:flex-start;background:var(--bg)}
.stat-card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);flex:1;min-width:320px}
.stat-card h3{font-size:13px;color:#455a64;margin-bottom:14px;font-weight:700}
.bar-row{margin-bottom:12px}
.bar-row .br-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px}
.bar-track{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .4s}

/* ════ 假期管理页 ════ */
#page-holiday{overflow-y:auto;padding:16px 20px;flex-direction:column;gap:12px}
.hol-header{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hol-header h3{font-size:13px;color:#455a64;font-weight:700;margin-right:auto}
.year-tabs{display:flex;gap:4px;flex-wrap:wrap}
.year-tab{padding:4px 12px;border:1px solid #b0bec5;background:#fff;color:#546e7a;border-radius:16px;cursor:pointer;font-size:12px;transition:.15s}
.year-tab:hover{background:#e3f2fd;border-color:#90caf9}
.year-tab.active{background:#1a73e8;color:#fff;border-color:#1a73e8;font-weight:700}
.holiday-section{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.holiday-section h3{font-size:13px;color:#455a64;margin-bottom:10px;font-weight:700}
.holiday-table{width:100%;border-collapse:collapse;font-size:12px}
.holiday-table th{background:#37474f;color:#fff;padding:7px 12px;text-align:left}
.holiday-table td{padding:6px 12px;border-bottom:1px solid #f0f0f0}
.holiday-table tr:hover td{background:#f5f5f5}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.tag-holiday{background:#fff9c4;color:#f57f17}
.tag-workday{background:#e8f5e9;color:#2e7d32}

/* ════ 模块管理 ════ */
#page-modules{overflow-y:auto;padding:16px 20px;flex-direction:column;gap:0}
.mod-panel{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden}
.module-card{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s}
.module-card:hover{background:#f5f5f5}
.module-color{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.module-name{flex:1;font-size:14px;font-weight:600}
.module-stats{font-size:12px;color:var(--muted)}
.mod-expand-btn{font-size:13px;color:#90a4ae;transition:transform .2s;flex-shrink:0}
.mod-expand-btn.open{transform:rotate(90deg)}
/* 任务清单 */
.mod-tasks{border-top:1px solid #f0f0f0;display:none;padding:0 18px 10px}
.mod-tasks.open{display:block}
.mod-tasks-toolbar{display:flex;align-items:center;gap:8px;padding:8px 0 6px;flex-wrap:wrap}
.mod-tasks-toolbar span{font-size:11px;color:#888}
.task-check-list{display:flex;flex-direction:column;gap:1px}
.tc-row{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:5px;transition:background .12s;font-size:12px;min-width:0}
.tc-row:hover{background:#f5f5f5}
.tc-row.tc-group{background:#eceff1;font-weight:700;padding:6px 4px;margin-top:4px;border-radius:6px}
.tc-row.tc-group:first-child{margin-top:0}
.tc-check{flex-shrink:0;width:15px;height:15px;cursor:pointer;accent-color:var(--primary)}
.tc-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-name.done{text-decoration:line-through;color:#aaa}
.tc-date{font-size:11px;color:#78909c;white-space:nowrap;width:82px;flex-shrink:0;text-align:right}
.tc-date-od{color:#c62828!important}
.tc-overdue{background:#fff8f8}
.tc-overdue:hover{background:#fdecea!important}
.tc-header{background:#f5f5f5;border-radius:5px;margin-bottom:2px}
.tc-col-w{width:52px;flex-shrink:0;text-align:center;font-size:11px;color:#78909c}
.tc-days-input{width:48px;flex-shrink:0;padding:2px 4px;border:1px solid #e0e0e0;border-radius:4px;font-size:11px;text-align:center;background:#fff;outline:none}
.tc-days-input:focus{border-color:var(--primary)}
.tc-pct-badge{font-size:10px;padding:1px 6px;border-radius:8px;background:#e3f2fd;color:#1565c0;white-space:nowrap}

/* ── 统计条 ── */
.stats-topbar{background:#fff;border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:20px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.stat-item{display:flex;align-items:center;gap:6px;font-size:12px}
.stat-dot{width:8px;height:8px;border-radius:50%}

/* ── 模态框 ── */
.mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.mask.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h2{font-size:15px;margin-bottom:18px;color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row.full{grid-column:1/-1}
.form-row label{font-size:11px;color:var(--muted)}
.form-row input,.form-row select,.form-row textarea{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none}
.form-row input:focus,.form-row select:focus{border-color:var(--primary)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal-footer .btn{padding:7px 18px;font-size:13px}
.btn-cancel{background:#f5f5f5;color:var(--text)}
.btn-save{background:var(--primary);color:#fff}

/* ── 工期信息提示 ── */
.day-info{font-size:11px;color:var(--muted);margin-top:2px}

/* 滚动条美化 */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#999}

/* 右键菜单 */
.ctx-menu{position:fixed;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:600;min-width:140px;overflow:hidden;display:none}
.ctx-menu.show{display:block}
.ctx-item{padding:9px 16px;font-size:12px;cursor:pointer;transition:.15s}
.ctx-item:hover{background:#e3f2fd}
.ctx-item.danger{color:#c62828}
.ctx-item.danger:hover{background:#fdecea}
.ctx-sep{height:1px;background:var(--border);margin:2px 0}
</style>

// 是否是工作日（考虑节假日和调休）
function isWorkday(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay(); // 0=日 6=六
  const isWeekend = dow === 0 || dow === 6;
  const isHol = holidays.some(h => h.date === dateStr && h.type === 'holiday');
  const isExtra = holidays.some(h => h.date === dateStr && h.type === 'workday');
  if (isHol) return false;          // 法定假日
  if (isExtra) return true;         // 调休上班
  if (isWeekend) return false;      // 普通周末
  return true;                      // 普通工作日
}
function isHolidayDate(d) { return holidays.some(h=>h.date===d&&h.type==='holiday'); }
function isWeekendDate(d) { const w=new Date(d).getDay();return w===0||w===6; }
function isWorkdayExtra(d) { return holidays.some(h=>h.date===d&&h.type==='workday'); }
function isToday(d) { return d===fmt(new Date()); }

// 计算两个日期之间的工作日数
function calcWorkdays(startStr, endStr) {
  if (!startStr || !endStr) return 0;
  let count = 0;
  let cur = new Date(startStr);
  const end = new Date(endStr);
  while (cur <= end) {
    if (isWorkday(fmt(cur))) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
// 计算自然日数
function calcNaturalDays(startStr, endStr) {
  if (!startStr || !endStr) return 0;
  return Math.round((new Date(endStr)-new Date(startStr))/86400000)+1;
}
// 从启动日期 + 自然日天数 → 完成日期
function addNaturalDays(startStr, n) {
  if (!startStr || !n) return '';
  const d = new Date(startStr);
  d.setDate(d.getDate() + n - 1);
  return fmt(d);
}

// 根据工作日数计算结束日期
function addWorkdays(startStr, n) {
  if (!startStr || !n) return '';
  let cur = new Date(startStr);
  let count = 0;
  while (count < n) {
    if (isWorkday(fmt(cur))) count++;
    if (count < n) cur.setDate(cur.getDate() + 1);
  }
  return fmt(cur);
}

function fmt(d) {
  if (!d) return '';
  if (typeof d === 'string') return d;
  return d.toISOString().slice(0,10);
}

// 更新组行的日期范围
function recalcGroups() {
  tasks.filter(t=>t.group).forEach(g => {
    const children = tasks.filter(c => !c.group && c.phase===g.phase && c.module===g.module && c.start);
    if (!children.length) return;
    g.start = children.map(c=>c.start).sort()[0];
    const ends = children.filter(c=>c.end).map(c=>c.end).sort().reverse();
    g.end = ends[0] || '';
    g.natural = g.start && g.end ? calcNaturalDays(g.start,g.end) : 0;
    g.workdays = g.start && g.end ? calcWorkdays(g.start,g.end) : 0;
    g.progress = children.length ? Math.round(children.reduce((s,c)=>s+c.progress,0)/children.length) : 0;
  });
}

// ─── 右侧甘特图 ───
function renderGantt() {
  const filtered = getFilteredTasks();
  if (!filtered.length) { document.getElementById('ganttGrid').innerHTML=''; return; }
  const starts = filtered.filter(t=>t.start).map(t=>t.start).sort();
  const ends = filtered.filter(t=>t.end).map(t=>t.end).sort().reverse();
  if (!starts.length) return;
  const minDate = starts[0];
  const maxDate = ends[0] || addNaturalDays(minDate, 90);

  // 生成日期数组
  const dates = [];
  let cur = new Date(minDate);
  const endD = new Date(maxDate);
  while (cur <= endD) { dates.push(fmt(cur)); cur.setDate(cur.getDate()+1); }

  const DAY_W = ganttDayW; // px per day

  // ── 表头月份行
  const months = {};
  dates.forEach(d => { const m=d.slice(0,7); if(!months[m])months[m]=0; months[m]++; });
  let monthHtml = '';
  Object.entries(months).forEach(([m,cnt]) => {
    monthHtml += `<div class="g-month-cell" style="width:${cnt*DAY_W}px;min-width:${cnt*DAY_W}px">${m.replace('-','年')}月</div>`;
  });

  // ── 表头日期行
  let dayHtml = '';
  dates.forEach(d => {
    const isT = isToday(d), isH = isHolidayDate(d), isW = isWeekendDate(d)&&!isWorkdayExtra(d), isE = isWorkdayExtra(d);
    let cls = '';
    if (isT) cls='today'; else if (isH) cls='holiday'; else if (isE) cls='workday-extra'; else if (isW) cls='weekend';
    const wk = ['日','一','二','三','四','五','六'][new Date(d).getDay()];
    dayHtml += `<div class="g-day-cell ${cls}" style="width:${DAY_W}px;min-width:${DAY_W}px" title="${d}">
      <span class="d-num">${parseInt(d.slice(8))}</span>
      <span class="d-week">${wk}</span>
    </div>`;
  });

  document.getElementById('ganttHead').innerHTML =
    `<div class="gantt-head-months">${monthHtml}</div>
     <div class="gantt-head-days">${dayHtml}</div>`;

  // ── 甘特行
  const totalW = dates.length * DAY_W;
  let rowsHtml = '';
  filtered.forEach(t => {
    const isGrp = t.group;
    const sel = t.id === selectedId ? ' selected' : '';
    const mod = modules.find(m=>m.id===t.module);
    const barColor = PHASE_COLORS[t.phase] || DEFAULT_PHASE_COLOR;

    // 背景格
    let cellsHtml = '';
    dates.forEach(d => {
      const isH = isHolidayDate(d), isW = isWeekendDate(d)&&!isWorkdayExtra(d);
      const isT = isToday(d), isE = isWorkdayExtra(d);
      let bg = '';
      if (isH) bg='holiday-bg'; else if (isE) bg='workday-extra-bg'; else if (isW) bg='weekend-bg';
      if (isT) bg+=' today-col';
      cellsHtml += `<div class="g-cell ${bg}" style="width:${DAY_W}px;min-width:${DAY_W}px"></div>`;
    });

    // 甘特条
    let barHtml = '';
    if (t.start && t.end) {
      const s = dates.indexOf(t.start), e = dates.indexOf(t.end);
      if (s >= 0) {
        const eIdx = e >= 0 ? e : dates.length-1;
        const left = s * DAY_W;
        const width = Math.max((eIdx - s + 1) * DAY_W - 2, DAY_W-2);
        if (isGrp) {
          barHtml = `<div class="g-bar g-bar-group" style="left:${left}px;width:${width}px;background:${barColor};opacity:.6"></div>`;
        } else {
          const doneW = Math.round(width * t.progress / 100);
          barHtml = `<div class="g-bar g-bar-task" style="left:${left}px;width:${width}px;background:${barColor};opacity:.75"></div>
            <div class="g-bar g-bar-done" style="left:${left}px;width:${doneW}px;background:${barColor};opacity:1"></div>`;
        }
      }
    }

    rowsHtml += `<div class="gantt-row${isGrp?' group':''}${sel}" data-id="${t.id}" style="width:${totalW}px"
      onclick="selectTask(${t.id})" ondblclick="showEditTask(${t.id})" oncontextmenu="showCtx(event,${t.id})">
      <div style="display:flex;position:relative;width:${totalW}px;height:100%">${cellsHtml}${barHtml}</div>
    </div>`;
  });

  document.getElementById('ganttRows').innerHTML = rowsHtml;
  document.getElementById('ganttGrid').style.width = totalW+'px';

  // 同步左右滚动（行高同步）
  syncScroll();
}

function getSelectedPreds() {
  const sel = document.getElementById('f_pred');
  return Array.from(sel.selectedOptions).map(o => parseInt(o.value));
}

// 设置前置任务选中状态（从任务的 predecessors 字段）
function setSelectedPreds(predIds) {
  const sel = document.getElementById('f_pred');
  const ids = new Set(predIds || []);
  Array.from(sel.options).forEach(o => { o.selected = ids.has(parseInt(o.value)); });
}

// 根据前置任务集合，计算本任务最早启动日（前置全部完成后下一工作日）
function calcStartFromPreds(predIds) {
  if (!predIds || !predIds.length) return null;
  let latest = '';
  predIds.forEach(pid => {
    const pt = tasks.find(t => t.id === pid);
    if (pt && pt.end && pt.end > latest) latest = pt.end;
  });
  if (!latest) return null;
  // 下一个自然日（不跳工作日，保持原有逻辑一致）
  const d = new Date(latest);
  d.setDate(d.getDate() + 1);
  return fmt(d);
}

// 拓扑排序重算所有含前置任务的任务时间
function recalcAllByPred() {
  const hasPred = tasks.filter(t => !t.group && t.predecessors && t.predecessors.length);
  if (!hasPred.length) { alert('没有设置前置任务的任务，无需重算。'); return; }

  // 最多迭代 tasks.length 轮（处理链式依赖）
  let changed = true, rounds = 0;
  while (changed && rounds < tasks.length) {
    changed = false; rounds++;
    hasPred.forEach(t => {
      const newStart = calcStartFromPreds(t.predecessors);
      if (!newStart) return;
      if (newStart !== t.start) {
        t.start = newStart;
        if (t.natural > 0) {
          t.end = addNaturalDays(newStart, t.natural);
          t.workdays = calcWorkdays(newStart, t.end);
        }
        changed = true;
      }
    });
  }
  recalcGroups();
  saveData();
  render();

}

// 启动日期变更：保持自然日不变，推算完成日期
function onStartChange() {
  const s = document.getElementById('f_start').value;
  const n = parseInt(document.getElementById('f_natural').value);
  if (s && n > 0) {
    const e = addNaturalDays(s, n);
    document.getElementById('f_end').value = e;
    document.getElementById('f_workdays').value = calcWorkdays(s, e);
  }
  updateDayInfo();
}
// 完成日期变更：反算自然日和工作日
function onEndChange() {
  const s = document.getElementById('f_start').value;
  const e = document.getElementById('f_end').value;
  if (s && e) {
    document.getElementById('f_natural').value = calcNaturalDays(s, e);
    document.getElementById('f_workdays').value = calcWorkdays(s, e);
  }
  updateDayInfo();
}
// 自然日变更：保持启动日期不变，推算完成日期
function calcEndFromDays() {
  const s = document.getElementById('f_start').value;
  const n = parseInt(document.getElementById('f_natural').value);
  if (s && n > 0) {
    const e = addNaturalDays(s, n);
    document.getElementById('f_end').value = e;
    document.getElementById('f_workdays').value = calcWorkdays(s, e);
    updateDayInfo();
  }
}
// 工作日变更：保持启动日期不变，推算完成日期
function calcEndFromWorkdays() {
  const s = document.getElementById('f_start').value;
  const w = parseInt(document.getElementById('f_workdays').value);
  if (s && w > 0) {
    const e = addWorkdays(s, w);
    document.getElementById('f_end').value = e;
    document.getElementById('f_natural').value = calcNaturalDays(s, e);
    updateDayInfo();
  }
}

function updateDayInfo() {
  const s = document.getElementById('f_start').value;
  const e = document.getElementById('f_end').value;
  const wd = document.getElementById('f_workdays').value;
  if (s && e) {
    const hd = (() => {
      let cnt=0, cur=new Date(s), end=new Date(e);
      while(cur<=end){const ds=fmt(cur);if(!isWorkday(ds)&&!(new Date(ds).getDay()===0||new Date(ds).getDay()===6))cnt++;cur.setDate(cur.getDate()+1);}
      return cnt;
    })();
    document.getElementById('f_dayinfo').textContent = `工作日 ${wd} 天（含假期 ${hd} 天休息）`;
  }
}

function saveTask() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('请填写任务名称'); return; }
  const s = document.getElementById('f_start').value;
  const e = document.getElementById('f_end').value;
  const predIds = getSelectedPreds();
  // 如果设置了前置任务，自动推算启动日
  let effStart = s;
  if (predIds.length) {
    const autoStart = calcStartFromPreds(predIds);
    if (autoStart) effStart = autoStart;
  }
  const effEnd = effStart !== s
    ? addNaturalDays(effStart, parseInt(document.getElementById('f_natural').value) || calcNaturalDays(s,e))
    : e;
  const data = {
    name, module: document.getElementById('f_module').value,
    phase: document.getElementById('f_phase').value,
    person: document.getElementById('f_person').value,
    start: effStart, end: effEnd,
    natural: calcNaturalDays(effStart, effEnd),
    workdays: calcWorkdays(effStart, effEnd),
    progress: parseInt(document.getElementById('f_progress').value),
    predecessors: predIds,
    group: false
  };
  if (editingId) {
    const t = tasks.find(t=>t.id===editingId);
    Object.assign(t, data);
  } else {
    // 检查是否需要自动插入到对应的组
    const nid = nextId();
    // 找到该 module+phase 的最后一个子任务后插入
    let insertIdx = -1;
    for (let i=0;i<tasks.length;i++) {
      if (!tasks[i].group && tasks[i].module===data.module && tasks[i].phase===data.phase) insertIdx=i;
    }
    const newTask = {...data, id:nid};
    if (insertIdx >= 0) tasks.splice(insertIdx+1,0,newTask);
    else tasks.push(newTask);
  }
  saveData();
  closeModal('taskModal');
  render();
}

let holViewYear = 2026;

function getHolYears() {
  const ys = new Set(holidays.map(h => h.year || parseInt(h.date.slice(0,4))));
  for (let y=2026;y<=2035;y++) ys.add(y);
  return [...ys].sort();
}

function renderYearTabs() {
  document.getElementById('yearTabs').innerHTML = getHolYears().map(y =>
    '<button class="year-tab' + (y===holViewYear?' active':'') + '" onclick="setHolYear(' + y + ')">' + y + '</button>'
  ).join('');
}

function setHolYear(y) {
  holViewYear = y;
  renderYearTabs();
  renderHolidayTable();
}

function renderHolidayTable() {
  const yr = holViewYear;
  const list = holidays
    .filter(h => (h.year||parseInt(h.date.slice(0,4))) === yr)
    .sort((a,b)=>a.date.localeCompare(b.date));
  const offCnt = list.filter(h=>h.type==='holiday').length;
  const extCnt = list.filter(h=>h.type==='workday').length;
  document.getElementById('holYearTitle').textContent = yr + ' 年节假日';
  document.getElementById('holYearStats').textContent = '共 ' + offCnt + ' 个放假日 · ' + extCnt + ' 个调休上班日';
  const groups = {}, nameOrder = [];
  list.forEach(h => {
    if (!groups[h.name]) { groups[h.name]=[]; nameOrder.push(h.name); }
    groups[h.name].push(h);
  });
  let html = '';
  nameOrder.forEach(name => {
    groups[name].forEach((h, i) => {
      const tag = h.type==='holiday'
        ? '<span class="tag tag-holiday">放假</span>'
        : '<span class="tag tag-workday">调休上班</span>';
      const wk = ['日','一','二','三','四','五','六'][new Date(h.date).getDay()];
      const key = encodeURIComponent(h.date + '|' + h.type);
      html += `<tr>
        <td>${i===0?'<strong>'+name+'</strong>':''}</td>
        <td style="color:#78909c">${h.year||yr}</td>
        <td>${h.date}</td>
        <td style="color:#78909c">周${wk}</td>
        <td>${tag}</td>
        <td><button onclick="deleteHoliday('${key}')" style="border:none;background:none;color:#c62828;cursor:pointer;font-size:12px">删除</button></td>
      </tr>`;
    });
  });
  if (!html) html = `<tr><td colspan="6" style="text-align:center;padding:20px;color:#aaa">${yr} 年暂无数据，可手动添加</td></tr>`;
  document.getElementById('holidayTbody').innerHTML = html;
}

  renderYearTabs();
  renderHolidayTable();

}

function saveHoliday() {
  const name = document.getElementById('h_name').value.trim();
  if (!name) { alert('请填写节日名称'); return; }
  const type  = document.getElementById('h_type_sel').value;
  const year  = parseInt(document.getElementById('h_year').value);
  const batch = document.getElementById('h_batch_mode').checked;
  let dates = [];
  if (batch) {
    dates = document.getElementById('h_batch').value
      .split(/[\n,，\s]+/).map(s=>s.trim())
      .filter(s=>/^\d{4}-\d{2}-\d{2}$/.test(s));
    if (!dates.length) { alert('请输入有效日期（格式 YYYY-MM-DD）'); return; }
  } else {
    const d = document.getElementById('h_date').value;
    if (!d) { alert('请选择日期'); return; }
    dates = [d];
  }
  let added = 0;
  dates.forEach(date => {
    if (!holidays.find(h=>h.date===date&&h.type===type)) {
      holidays.push({name, year, date, type});

    }

  if (!added) { alert('所选日期已全部存在'); return; }

  closeModal('holidayModal');
  renderHolidays();

function deleteHoliday(key) {
  const decoded = decodeURIComponent(key);
  const parts = decoded.split('|');
  const date = parts[0], type = parts[1];
  if (!confirm('确认删除 ' + date + ' (' + (type==='holiday'?'放假日':'调休上班') + ')？')) return;
  holidays = holidays.filter(h=>!(h.date===date&&h.type===type));
  saveData();
  renderHolidays();
}

            <span class="tc-col-w" style="font-weight:700;color:#546e7a;font-size:11px">工作日</span>
            <span class="tc-date" style="font-weight:700;color:#546e7a;font-size:11px">截止日期</span>

      const gDone = children.filter(t=>t.progress===100).length;
      const phaseEsc = g.phase.replace(/'/g,"\\'");
      html += `<div class="tc-row tc-group">
        <div style="width:15px;flex-shrink:0"></div>

        const wd   = t.workdays  || 0;

        const endStr = t.end ? t.end : '';

function saveModule() {
  const name = document.getElementById('m_name').value.trim();
  const color = document.getElementById('m_color').value;
  if (!name) { alert('请填写模块名称'); return; }
  if (editingModuleId) {
    // 编辑模式：只更新名称和颜色
    const mod = modules.find(m=>m.id===editingModuleId);
    mod.name = name; mod.color = color;
  } else {
    // 新增模式：创建模块并自动生成各阶段任务
    if (modules.find(m=>m.id===name)) { alert('模块名已存在'); return; }
    modules.push({id:name, name, color});
    // 读取各阶段启动日期，生成任务
    PHASES.forEach(ph => {
      const inputId = 'm_ps_' + ph.replace(/[^a-z0-9]/gi,'_');
      const el = document.getElementById(inputId);
      const defs = PHASE_TASK_DEFS[ph];
      if (!el || !defs) return;
      let start = el.value || TODAY;
      // 阶段组行
      tasks.push(mkTask(ph, name + ' - ' + ph, name, start, 0, true));
      // 子任务（按模板顺序依次排列）
      defs.forEach(d => {
        const taskName = getTaskName(name, ph, d.sub);
        const t = mkTask(ph, taskName, name, start, d.days);
        tasks.push(t);
        if (t.end) start = fmt(new Date(new Date(t.end).getTime() + 86400000));
      });
    });
  }
  saveData();
  closeModal('moduleModal');
  renderModules();
  renderFilters();
  render();
}
function deleteModule(id) {
  const mod = modules.find(m=>m.id===id);
  if (!mod) return;
  const cnt = tasks.filter(t=>t.module===id).length;
  if (!confirm(`确认删除模块"${mod.name}"？\n该模块下 ${cnt} 个任务也会一并删除。`)) return;
  modules = modules.filter(m=>m.id!==id);
  tasks = tasks.filter(t=>t.module!==id);
  saveData();
  closeModal('moduleModal');
  renderModules();
  renderFilters();
  render();
}

// ── 批量设置阶段日期 ──
let _bdModule = '', _bdPhase = '';
function showBatchDate(moduleId, phase) {
  _bdModule = moduleId;
  _bdPhase  = phase;
  document.getElementById('bd_module').textContent = moduleId;
  document.getElementById('bd_phase').textContent  = phase;
  const first = tasks.find(t => !t.group && t.module === moduleId && t.phase === phase);
  document.getElementById('bd_start').value = (first && first.start) ? first.start : TODAY;
  document.getElementById('batchDateModal').classList.add('show');
}
function applyBatchDate() {
  const startDate = document.getElementById('bd_start').value;
  if (!startDate) { alert('请选择起始日期'); return; }
  const phaseTasks = tasks.filter(t => !t.group && t.module === _bdModule && t.phase === _bdPhase);
  if (!phaseTasks.length) { closeModal('batchDateModal'); return; }
  let cur = startDate;
  phaseTasks.forEach(t => {
    t.start = cur;
    if (t.workdays && t.workdays > 0) {
      t.end     = addWorkdays(cur, t.workdays);
      t.natural = calcNaturalDays(cur, t.end);
    } else if (t.natural && t.natural > 0) {
      t.end     = addNaturalDays(cur, t.natural);
      t.workdays = calcWorkdays(cur, t.end);
    } else {
      t.workdays = 1;
      t.end      = addWorkdays(cur, 1);
      t.natural  = calcNaturalDays(cur, t.end);
    }
    const next = new Date(t.end);
    next.setDate(next.getDate() + 1);
    cur = fmt(next);
  });
  recalcGroups();
  saveData();
  renderModules();
  render();
  closeModal('batchDateModal');
  alert('已推算 ' + phaseTasks.length + ' 个任务的日期');
}

// ═══════════════════════════════════════════════════
// 进展分析
// ═══════════════════════════════════════════════════
function renderStatsPage() {
  // 模块进度
  let h1 = '<h3>各模块完成度</h3>';
  modules.forEach(mod => {
    const sub = tasks.filter(t=>!t.group&&t.module===mod.id);
    const avg = sub.length ? Math.round(sub.reduce((s,t)=>s+t.progress,0)/sub.length) : 0;
    const done = sub.filter(t=>t.progress===100).length;
    h1 += `<div class="bar-row">
      <div class="br-label"><span>${mod.name}</span><span style="color:${mod.color}">${done}/${sub.length} · ${avg}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${avg}%;background:${mod.color}"></div></div>
    </div>`;
  });
  document.getElementById('statModules').innerHTML = h1;

  // 阶段分布
  let h2 = '<h3>阶段任务分布</h3>';
  PHASES.forEach(ph => {
    const sub = tasks.filter(t=>!t.group&&t.phase===ph);
    const done=sub.filter(t=>t.progress===100).length, inp=sub.filter(t=>t.progress>0&&t.progress<100).length;
    const avg = sub.length ? Math.round(sub.reduce((s,t)=>s+t.progress,0)/sub.length) : 0;
    h2 += `<div class="bar-row">
      <div class="br-label"><span>${ph}</span>
        <span>✓${done} ⚡${inp} ○${sub.length-done-inp}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${avg}%;background:#${ph==='量产中测'?'e53935':'1e88e5'}"></div></div>
    </div>`;
  });
  document.getElementById('statPhases').innerHTML = h2;

  // 人员工作量
  const persons = [...new Set(tasks.filter(t=>t.person&&!t.group).map(t=>t.person))];
  let h3 = '<h3>人员工作量（工作日）</h3>';
  if (!persons.length) {
    h3 += '<p style="color:#aaa;font-size:12px">暂未填写跟进人</p>';
  } else {
    const maxWD = Math.max(...persons.map(p=>tasks.filter(t=>!t.group&&t.person===p).reduce((s,t)=>s+t.workdays,0)));
    persons.forEach(p => {
      const wd = tasks.filter(t=>!t.group&&t.person===p).reduce((s,t)=>s+t.workdays,0);
      h3 += `<div class="bar-row">
        <div class="br-label"><span>${p}</span><span>${wd} 工作日</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${maxWD?Math.round(wd/maxWD*100):0}%;background:#8e24aa"></div></div>
      </div>`;
    });
  }
  document.getElementById('statPersons').innerHTML = h3;

  // 时间线
  const sub = tasks.filter(t=>!t.group&&t.start);
  const allStarts = sub.map(t=>t.start).sort();
  const allEnds = sub.filter(t=>t.end).map(t=>t.end).sort().reverse();
  const overdue = sub.filter(t=>t.end&&t.end<TODAY&&t.progress<100).length;
  const totalND = sub.reduce((s,t)=>s+t.natural,0);
  const totalWD = sub.reduce((s,t)=>s+t.workdays,0);
  document.getElementById('statTimeline').innerHTML = `<h3>整体时间线</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#e3f2fd;border-radius:6px"><span>项目起始</span><strong>${allStarts[0]||'—'}</strong></div>
      <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#fce4ec;border-radius:6px"><span>计划完成</span><strong>${allEnds[0]||'—'}</strong></div>
      <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#f3e5f5;border-radius:6px"><span>总工时（自然日）</span><strong>${totalND} 天</strong></div>
      <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#e8f5e9;border-radius:6px"><span>总工时（工作日）</span><strong>${totalWD} 天</strong></div>
      <div style="display:flex;justify-content:space-between;padding:8px 12px;background:${overdue?'#fdecea':'#f5f5f5'};border-radius:6px"><span>已逾期任务</span><strong style="color:${overdue?'#c62828':'inherit'}">${overdue} 项</strong></div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// 导出 Excel
// ═══════════════════════════════════════════════════
// ─────────────────────────────────────────────────────────────
// 导出 Excel（含公式关联）
// 列布局（1-based）：
//   A:序号  B:任务名称  C:模块  D:阶段  E:跟进人
//   F:启动日期  G:完成日期  H:工时(自然日)  I:工时(工作日)
//   J:完成度(%)  K:状态
// 公式说明：
//   G（完成日期）= F（启动日期）+ H（自然日）- 1
//   I（工作日）  = NETWORKDAYS(F, G, 节假日区域) - 调休补班修正
//   K（状态）    = IF 公式判断
//   组行 H/I     = SUM 子任务
//   组行 J       = AVERAGE 子任务完成度
// ─────────────────────────────────────────────────────────────
function exportExcel() {
  const wb = XLSX.utils.book_new();

  // ── 日期序列号工具（全局，buildSheet 也用）
  // yyyy-mm-dd → Excel 整数序列号，基于 UTC 午夜，无时区偏移
  function dateSerial(s) {
    if (!s) return 0;
    const p = s.split('-');
    if (p.length !== 3) return 0;
    return Math.round((Date.UTC(+p[0],+p[1]-1,+p[2]) - Date.UTC(1899,11,30)) / 86400000);
  }

  // ── 1. 先写节假日表
  // NETWORKDAYS 第三参数只能包含数字（日期序列号），空单元格或字符串会导致 #VALUE!
  // 因此：B列只放 type='n' 的放假日期，C列只放调休上班日，不写空格
  const holSheet = '节假日一览表';
  const offDates  = holidays.filter(h=>h.type==='holiday').map(h=>h.date).sort();
  const workDates = holidays.filter(h=>h.type==='workday').map(h=>h.date).sort();
  const holMaxLen = Math.max(offDates.length, workDates.length, 1);

  const hws = {};
  // 表头
  hws['A1'] = {v:'节日',        t:'s'};
  hws['B1'] = {v:'日期（放假）', t:'s'};
  hws['C1'] = {v:'调休上班日',  t:'s'};
  for (let i=0; i<holMaxLen; i++) {
    const row = i + 2;
    // A列：第一个放假日对应的节日名
    const name = offDates[i]
      ? (holidays.find(h=>h.type==='holiday'&&h.date===offDates[i])||{}).name||''
      : '';
    hws['A'+row] = {v: name, t:'s'};
    // B列：放假日（纯数字，NETWORKDAYS可正常引用）
    if (offDates[i]) {
      hws['B'+row] = {v: dateSerial(offDates[i]), t:'n', z:'yyyy-mm-dd'};
    }
    // C列：调休上班日（纯数字）
    if (workDates[i]) {
      hws['C'+row] = {v: dateSerial(workDates[i]), t:'n', z:'yyyy-mm-dd'};
    }
    // 注意：没有数据的格子完全不写，避免空字符串进入 NETWORKDAYS 范围
  }
  hws['!ref'] = 'A1:C' + (holMaxLen + 1);
  hws['!cols'] = [{wch:12},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, hws, holSheet);

  // NETWORKDAYS 引用 B 列放假日期范围
  const holOffRange = offDates.length > 0
    ? `'${holSheet}'!$B$2:$B$${offDates.length + 1}`
    : null; // 无节假日时省略第三参数

  // ── 辅助：把数据行写入 worksheet
  // 策略��公式 + 缓存值同时写入（v 字段）
  //   Excel 打开直接显示缓存值；Ctrl+S 后公式自动重算
  //   F 列（启动日期）：静态日期值，用户可直接修改
  //   G 列（完成日期）：=F+H-1  缓存值=t.end
  //   H 列（自然日）  ：静态数值，用户可直接修改
  //   I 列（工作日）  ：=NETWORKDAYS(F,G[,节假日])  缓存值=t.workdays
  //   J 列（完成度）  ：静态数值
  //   K 列（状态）    ：=IF(J=100,...)  缓存值=statusText
  // shortName=true：子任务名去掉"模块_阶段_"前缀，只显示子任务名（用于模块分表）
  // shortName=false：保持完整任务名（用于项目管理总表，导入时匹配用）
  function buildSheet(taskList, shortName) {
    const ws = {};
    const range = {s:{r:0,c:0}, e:{r:0,c:10}};

    // 写静态值
    function sc(r, c, v, t, z) {
      const a = XLSX.utils.encode_cell({r,c});
      ws[a] = {v, t: t||'s'};
      if (z) ws[a].z = z;
    }
    // 写公式，同时附带缓存值 cv（避免 Excel 打开时报错）
    function sf(r, c, f, cv, t, z) {
      const a = XLSX.utils.encode_cell({r,c});
      ws[a] = {f, v: cv, t: t||'n'};
      if (z) ws[a].z = z;
    }
    // 写日期公式，缓存值为整数序列号；日期为空时不写此格
    function sfDate(r, c, f, dateStr) {
      const serial = dateSerial(dateStr);
      const a = XLSX.utils.encode_cell({r,c});
      if (serial) {
        ws[a] = {f, v: serial, t: 'n', z: 'yyyy-mm-dd'};
      } else {
        // 无日期：只写公式，缓存值给空字符串
        ws[a] = {f, v: '', t: 's'};
      }
    }
    // 写静态日期
    function sd(r, c, dateStr) {
      if (!dateStr) return;
      const serial = dateSerial(dateStr);
      if (!serial) return;
      const a = XLSX.utils.encode_cell({r,c});
      ws[a] = {v: serial, t: 'n', z: 'yyyy-mm-dd'};
    }
    // 状态文字（用作公式缓存值）
    function statusText(t) {
      if (t.progress >= 100) return '已完成';
      const today = new Date(); today.setHours(0,0,0,0);
      if (t.end) { const ed = new Date(t.end); ed.setHours(0,0,0,0); if (ed < today) return '已逾期'; }
      if (t.progress >= 75) return '收尾中';
      if (t.progress >= 50) return '进行中';
      if (t.progress > 0)   return '已启动';
      return '待启动';
    }

    // 表头
    ['序号','任务名称','所属模块','所属阶段','跟进人',
     '启动日期','完成日期','工时(自然日)','工时(工作日)','完成度(%)','状态'
    ].forEach((h,ci) => sc(0, ci, h));

    // 预扫描：建立 excelRow 映射（表头占第1行，数据从第2行起）
    const rowMap = taskList.map((task, idx) => ({task, er: idx + 2}));

    let seq = 0;
    rowMap.forEach(({task:t, er}) => {
      const r = er - 1; // 0-based row index
      if (r > range.e.r) range.e.r = r;

      if (t.group) {
        // 找本组子任务的 excelRow 范围
        const kids = rowMap.filter(x => !x.task.group && x.task.module===t.module && x.task.phase===t.phase);
        sc(r, 0, '');
        sc(r, 1, t.name);
        sc(r, 2, t.module);
        sc(r, 3, t.phase);
        sc(r, 4, '');
        if (kids.length) {
          const fr = kids[0].er, lr = kids[kids.length-1].er;
          // 预计算缓存值
          const starts  = kids.map(k=>k.task.start).filter(Boolean).sort();
          const ends    = kids.map(k=>k.task.end).filter(Boolean).sort();
          const minS    = starts[0]||'';
          const maxE    = ends[ends.length-1]||'';
          const sumWd   = kids.reduce((s,k)=>s+(k.task.workdays||0), 0);
          const avgPct  = Math.round(kids.reduce((s,k)=>s+(k.task.progress||0),0)/kids.length);
          const nat     = minS && maxE ? calcNaturalDays(minS, maxE) : 0;
          // F: MIN 子任务启动日期
          sfDate(r, 5, `MIN(F${fr}:F${lr})`, minS);
          // G: MAX 子任务完成日期
          sfDate(r, 6, `MAX(G${fr}:G${lr})`, maxE);
          // H: 组自然日 = G - F + 1
          sf(r, 7, `IF(AND(F${er}<>"",G${er}<>""),G${er}-F${er}+1,"")`, nat||'', nat?'n':'s');
          // I: 组工作日 = SUM 子任务工作日
          sf(r, 8, `SUM(I${fr}:I${lr})`, sumWd, 'n');
          // J: 组完成度 = ROUND(AVERAGE,0)
          sf(r, 9, `ROUND(AVERAGE(J${fr}:J${lr}),0)`, avgPct, 'n');
          // K: 组状态
          const grpSt = avgPct>=100?'已完成':avgPct>0?'进行中':'待启动';
          sf(r, 10, `IF(J${er}=100,"已完成",IF(J${er}>0,"进行中","待启动"))`, grpSt, 's');
        } else {
          [5,6,7,8,9,10].forEach(ci => sc(r, ci, ''));
        }

      } else {
        seq++;
        sc(r, 0, seq, 'n');
        // 短名：去掉"模块_阶段_"前缀（如"核心板_手板1_原理图设计" → "原理图设计"）
        const dispName = shortName
          ? (t.name.startsWith(t.module+'_'+t.phase+'_') ? t.name.slice((t.module+'_'+t.phase+'_').length) : t.name)
          : t.name;
        sc(r, 1, dispName);
        sc(r, 2, t.module);
        sc(r, 3, t.phase);
        sc(r, 4, t.person||'');
        // F: 启动日期（静态，用户可直接改）
        sd(r, 5, t.start);
        // G: =F+H-1  缓存值=t.end
        sfDate(r, 6, `IF(OR(F${er}="",H${er}=0),"",F${er}+H${er}-1)`, t.end||'');
        // H: 自然日（静态，用户可直接改）
        sc(r, 7, t.natural||0, 'n');
        // I: =NETWORKDAYS(F,G[,节假日])  缓存值=t.workdays
        const ndFormula = holOffRange
          ? `IF(OR(F${er}="",G${er}=""),"",NETWORKDAYS(F${er},G${er},${holOffRange}))`
          : `IF(OR(F${er}="",G${er}=""),"",NETWORKDAYS(F${er},G${er}))`;
        sf(r, 8, ndFormula, t.workdays||0, 'n');
        // J: 完成度（静态）
        sc(r, 9, t.progress||0, 'n');
        // K: 状态公式  缓存值=statusText
        sf(r, 10,
          `IF(J${er}=100,"已完成",IF(AND(G${er}<>"",G${er}<TODAY(),J${er}<100),"已逾期",IF(J${er}>=75,"收尾中",IF(J${er}>=50,"进行中",IF(J${er}>0,"已启动","待启动")))))`,
          statusText(t), 's'
        );
      }
    });

    range.e.c = 10;
    ws['!ref'] = XLSX.utils.encode_range(range);
    ws['!cols'] = [5,38,12,10,10,12,12,10,10,10,10].map(w=>({wch:w}));
    return ws;
  }


  // ── 2. 项目管理总表（任务名保持完整：模块_阶段_子任务）
  const ws_all = buildSheet(tasks, false);
  XLSX.utils.book_append_sheet(wb, ws_all, '项目管理');

  // ── 3. 各模块分表（任务名使用短名：去掉"模块_阶段_"前缀，只显示子任务名）
  modules.forEach(mod => {
    const modTasks = tasks.filter(t => t.module === mod.id);
    const ws_mod = buildSheet(modTasks, true); // shortName=true
    XLSX.utils.book_append_sheet(wb, ws_mod, mod.name.slice(0,30));
  });

  XLSX.writeFile(wb, `硬件项目计划_${TODAY.replace(/-/g,'')}.xlsx`);
}

// ═══════════════════════════════════════════════════
// Excel 导入
// ═══════════════════════════════════════════════════
function importExcel(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // 允许重复选同一文件

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});

      // ── 辅助：日期格式统一为 yyyy-mm-dd
      function toDateStr(v) {
        if (!v) return '';
        if (typeof v === 'string') {
          const m = v.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
          if (m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
          return '';
        }
        if (v instanceof Date) {
          // 用本地时间取日期，避免 toISOString() UTC 偏移导致差一天
          return v.getFullYear() + '-' +
            String(v.getMonth()+1).padStart(2,'0') + '-' +
            String(v.getDate()).padStart(2,'0');
        }
        // Excel 整数序列号（基于 1899-12-30 UTC）
        if (typeof v === 'number') {
          const d = new Date((v - 25569) * 86400000);
          return d.getUTCFullYear() + '-' +
            String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
            String(d.getUTCDate()).padStart(2,'0');
        }
        return '';
      }

      // ── 辅助：从一个 worksheet 的行数据导入任务
      // moduleHint: 如果是模块分表，传入模块ID（任务名是短名，需要拼接前缀匹配）
      // 返回 {updated, added, skipped}
      function importSheet(ws, moduleHint) {
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});
        if (rows.length < 2) return {updated:0, added:0, skipped:0};

        const hdr = rows[0].map(h => String(h).trim());
        const CI = {
          seq:    hdr.findIndex(h => h.includes('序号')),
          name:   hdr.findIndex(h => h.includes('任务名称') || h.includes('任务名')),
          module: hdr.findIndex(h => h.includes('所属模块') || h.includes('模块')),
          phase:  hdr.findIndex(h => h.includes('所属阶段') || h.includes('阶段')),
          person: hdr.findIndex(h => h.includes('跟进人') || h.includes('负责人')),
          start:  hdr.findIndex(h => h.includes('启动日期') || h.includes('开始日期')),
          end:    hdr.findIndex(h => h.includes('完成日期') || h.includes('结束日期')),
          natural:hdr.findIndex(h => h.includes('自然日')),
          wd:     hdr.findIndex(h => h.includes('工作日')),
          pct:    hdr.findIndex(h => h.includes('完成度') || h.includes('进度')),
        };
        if (CI.name < 0) return {updated:0, added:0, skipped:rows.length-1};

        let updated=0, added=0, skipped=0;

        for (let ri = 1; ri < rows.length; ri++) {
          const row = rows[ri];
          const seqVal  = CI.seq >= 0 ? String(row[CI.seq]||'').trim() : '';
          let   nameVal = String(row[CI.name]||'').trim();
          // 模块列：分表里有值就用，没有则用 moduleHint
          let   modVal  = CI.module >= 0 ? String(row[CI.module]||'').trim() : '';
          if (!modVal && moduleHint) modVal = moduleHint;
          const phaseVal= CI.phase >= 0 ? String(row[CI.phase]||'').trim() : '';

          if (!nameVal || !modVal) { skipped++; continue; }

          // 空序号 = 组行，跳过
          const isGroup = !seqVal || isNaN(parseInt(seqVal));
          if (isGroup) { skipped++; continue; }

          // 模块分表用短名，尝试两种匹配：
          //   1. 直接用短名匹配（全名 = 模块_阶段_短名）
          //   2. 退而用nameVal本身（兼容全名）
          const fullName = (moduleHint && phaseVal && !nameVal.startsWith(modVal+'_'))
            ? modVal + '_' + phaseVal + '_' + nameVal
            : nameVal;

          const startVal  = toDateStr(CI.start  >= 0 ? row[CI.start]  : '');
          const endVal    = toDateStr(CI.end     >= 0 ? row[CI.end]    : '');
          const naturalVal= CI.natural >= 0 ? parseInt(row[CI.natural])||0 : 0;
          const wdVal     = CI.wd      >= 0 ? parseInt(row[CI.wd])||0     : 0;
          const pctVal    = CI.pct     >= 0 ? Math.min(100,Math.max(0,parseInt(row[CI.pct])||0)) : 0;
          const personVal = CI.person  >= 0 ? String(row[CI.person]||'').trim() : '';

          // 确保模块存在
          if (!modules.find(m => m.id === modVal)) {
            const colors = ['#1e88e5','#8e24aa','#00897b','#e53935','#f4511e','#039be5','#7cb342'];
            modules.push({id:modVal, name:modVal, color:colors[modules.length%colors.length]});
          }

          // 匹配：先用全名，再用nameVal原始值
          let existing = tasks.find(t => !t.group && t.module===modVal && t.phase===phaseVal && t.name===fullName)
                      || tasks.find(t => !t.group && t.module===modVal && t.phase===phaseVal && t.name===nameVal);

          if (existing) {
            if (personVal)   existing.person   = personVal;
            if (startVal)    existing.start    = startVal;
            if (endVal)      existing.end      = endVal;
            if (naturalVal)  existing.natural  = naturalVal;
            if (wdVal)       existing.workdays = wdVal;
            existing.progress = pctVal;
            updated++;
          } else {
            // 新增任务，插到同模块+阶段最后一个子任务之后
            let insertIdx = -1;
            for (let i = 0; i < tasks.length; i++) {
              if (!tasks[i].group && tasks[i].module===modVal && tasks[i].phase===phaseVal) insertIdx = i;
            }
            const newTask = {
              id:nextId(), group:false, phase:phaseVal,
              name: fullName, module:modVal, person:personVal,
              start:startVal, end:endVal, natural:naturalVal, workdays:wdVal,
              progress:pctVal, predecessors:[]
            };
            if (insertIdx >= 0) {
              tasks.splice(insertIdx+1, 0, newTask);
            } else {
              if (!tasks.some(t=>t.group&&t.module===modVal&&t.phase===phaseVal)) {
                tasks.push({id:nextId(),group:true,name:modVal+' - '+phaseVal,
                  module:modVal,phase:phaseVal,person:'',start:startVal,end:endVal,
                  natural:0,workdays:0,progress:0,predecessors:[]});
              }
              tasks.push(newTask);
            }
            added++;
          }
        }
        return {updated, added, skipped};
      }

      // ── 导入策略：
      //   1. 逐个模块分表（Sheet名与模块ID精确匹配）导入对应模块的任务
      //   2. 再处理"项目管理"总表（只补充模块分表未覆盖到的模块）
      //   3. 最后处理节假日
      let totalUpdated=0, totalAdded=0, totalSkipped=0;
      const importedModules = new Set();

      // 步骤1：模块分表优先
      modules.forEach(mod => {
        const sn = wb.SheetNames.find(n => n === mod.name || n === mod.id);
        if (!sn) return;
        const r = importSheet(wb.Sheets[sn], mod.id);
        totalUpdated += r.updated; totalAdded += r.added; totalSkipped += r.skipped;
        importedModules.add(mod.id);
      });

      // 步骤2：项目管理总表 —— 只处理尚未被模块分表覆盖的模块
      const allSheet = wb.SheetNames.find(n => n === '项目管理');
      if (allSheet) {
        const ws = wb.Sheets[allSheet];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});
        if (rows.length >= 2) {
          const hdr = rows[0].map(h=>String(h).trim());
          const modCI = hdr.findIndex(h=>h.includes('所属模块')||h.includes('模块'));
          // 找出总表里有哪些模块没被分表覆盖
          const uncovered = new Set();
          for (let ri=1; ri<rows.length; ri++) {
            const mv = modCI>=0 ? String(rows[ri][modCI]||'').trim() : '';
            if (mv && !importedModules.has(mv)) uncovered.add(mv);
          }
          if (uncovered.size > 0) {
            // 过滤只处理未覆盖模块的行
            const filteredWs = {};
            // 复制表头
            hdr.forEach((h,ci)=>{ filteredWs[XLSX.utils.encode_cell({r:0,c:ci})]={v:h,t:'s'}; });
            let newR = 1;
            for (let ri=1; ri<rows.length; ri++) {
              const mv = modCI>=0 ? String(rows[ri][modCI]||'').trim() : '';
              if (!mv || uncovered.has(mv)) {
                rows[ri].forEach((v,ci)=>{ filteredWs[XLSX.utils.encode_cell({r:newR,c:ci})]={v,t:typeof v==='number'?'n':'s'}; });
                newR++;
              }
            }
            filteredWs['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:newR-1,c:hdr.length-1}});
            const r = importSheet(filteredWs, null);
            totalUpdated += r.updated; totalAdded += r.added; totalSkipped += r.skipped;
          }
        }
      }

      // 步骤3：节假日
      let holAdded = 0;
      const holSheet = wb.SheetNames.find(n => n.includes('节假日'));
      if (holSheet) {
        const hrows = XLSX.utils.sheet_to_json(wb.Sheets[holSheet], {header:1, defval:'', raw:true});
        for (let ri = 1; ri < hrows.length; ri++) {
          const [hname, offDate, workDate] = hrows[ri];
          const nameStr = String(hname||'').trim();
          if (offDate) {
            const d = toDateStr(offDate);
            const y = d ? parseInt(d.slice(0,4)) : 0;
            if (d && !holidays.find(h=>h.date===d&&h.type==='holiday')) {
              holidays.push({name:nameStr||'假期', year:y, date:d, type:'holiday'});
              holAdded++;
            }
          }
          if (workDate) {
            const d = toDateStr(workDate);
            const y = d ? parseInt(d.slice(0,4)) : 0;
            if (d && !holidays.find(h=>h.date===d&&h.type==='workday')) {
              holidays.push({name:nameStr||'调休', year:y, date:d, type:'workday'});
              holAdded++;
            }
          }
        }
      }

      recalcGroups();
      saveData();
      render();
      renderFilters();

      const nl = String.fromCharCode(10);
      alert(['导入完成！',
        '更新任务：' + totalUpdated + ' 条',
        '新增任务：' + totalAdded  + ' 条',
        totalSkipped > 0 ? '跳过行：' + totalSkipped + ' 条（组行/空行）' : '',
        holAdded > 0 ? '新增假期：' + holAdded + ' 条' : '',
      ].filter(Boolean).join(nl));

    } catch(err) {
      console.error('importExcel error:', err);
      alert('导入失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}


// ═══════════════════════════════════════════════════
// 页签切换
// ═══════════════════════════════════════════════════
function switchPage(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (el) el.classList.add('active');
  if (name==='stats') renderStatsPage();
  if (name==='holiday') renderHolidays();
  if (name==='modules') renderModules();
}

// 关闭模态框
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.mask').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) closeModal(m.id); });
});

// ═══════════════════════════════════════════════════
// 持久化存储
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'pm_rx101_data';

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tasks, modules, holidays, _tid, _v: 'rx101_v2026_excel'
    }));
  } catch(e) { console.warn('saveData failed', e); }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.modules && d.modules.length) modules = d.modules;
    if (d.tasks   && d.tasks.length)   tasks   = d.tasks;
    if (d.holidays && d.holidays.length) holidays = d.holidays;
    if (d._tid) _tid = d._tid;
    return true;
  } catch(e) { console.warn('loadData failed', e); return false; }
}

function resetData() {
  if (!confirm('确认重置所有数据为初始状态？（无法撤销）')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ═══════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════
loadData();
render();
</script>
